upstream mnxstore {
    server web:8000;
}

server {
    listen 80;
    server_name mnxstore.com www.mnxstore.com 159.195.52.197;
    client_max_body_size 20M;

    # No TLS and no ACME challenge location here: this container only
    # listens on host port 8089. The box's host-level nginx (already
    # fronting another site on 80/443) terminates TLS and reverse-proxies
    # mnxstore.com to 127.0.0.1:8089 — see DEPLOY.md.

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://mnxstore;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Pass through whatever the host nginx already determined (https for
        # real visitors via Cloudflare) instead of $scheme, which at this
        # hop is always "http" (host->container is plain HTTP) — using
        # $scheme here would make Django think every request is insecure
        # and SECURE_SSL_REDIRECT would loop forever once DEBUG=False.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
