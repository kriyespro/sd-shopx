upstream mnxstore {
    server web:8000;
}

server {
    listen 80;
    server_name mnxstore.com www.mnxstore.com 159.195.52.197;
    client_max_body_size 20M;

    # No TLS here: this container only listens on host port 8089.
    # Host nginx + Cloudflare terminate TLS. See DEPLOY.md.

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://mnxstore;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # ALWAYS https — never $scheme / $http_x_forwarded_proto.
        # This hop is plain HTTP (host→container). If we pass "http",
        # Django SECURE_SSL_REDIRECT (DEBUG=False) 301-loops forever.
        proxy_set_header X-Forwarded-Proto https;
    }
}
